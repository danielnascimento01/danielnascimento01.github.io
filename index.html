<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Acompanhador da Copa 2026</title>
  <meta name="description" content="App não-oficial para acompanhar a Copa do Mundo 2026: jogos, placares ao vivo, classificação, mata-mata e diversão." />
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center;
      font-family: -apple-system, "Segoe UI", Roboto, system-ui, sans-serif;
      background: #0b6b3a; color: #fff; padding: 24px; text-align: center;
    }
    .card { max-width: 560px; }
    h1 { font-size: 2rem; margin: 0 0 .25rem; letter-spacing: -.02em; }
    .kicker { text-transform: uppercase; letter-spacing: .15em; font-size: .8rem; opacity: .85; margin-bottom: 1rem; }
    p { line-height: 1.6; opacity: .92; }
    .stores { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin: 1.5rem 0; }
    .stores a {
      display: inline-block; padding: .7rem 1.1rem; border-radius: 12px;
      background: #fff; color: #0b6b3a; text-decoration: none; font-weight: 700;
    }
    footer { margin-top: 2rem; font-size: .8rem; opacity: .7; }
    footer a { color: #fff; }
  </style>
</head>
<body>
  <main class="card">
    <div class="kicker">Copa do Mundo 2026</div>
    <h1>⚽ Acompanhador da Copa</h1>
    <p>Jogos, placares ao vivo, classificação dos grupos, mata-mata e diversão — tudo em um app leve e rápido.</p>
    <div class="stores">
      <a href="https://apps.apple.com/" rel="noopener">App Store</a>
      <a href="https://play.google.com/store" rel="noopener">Google Play</a>
    </div>
    <footer>
      Feito por Daniel Nascimento · <a href="mailto:nascimento.daniel00@gmail.com">Contato</a><br />
      App independente, sem vínculo oficial com a FIFA.
    </footer>
  </main>
</body>
</html>
